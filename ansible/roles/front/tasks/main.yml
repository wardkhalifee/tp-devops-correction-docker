- name: Run front container
  community.docker.docker_container:
    name: front
    image: wardkhalife/front:latest
    state: started
    restart_policy: always
    networks:
      - name: my_network
    ports:
      - "8080:80"
    pull: true
    recreate: true
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python3